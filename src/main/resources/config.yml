lobby: null

lobby-command: true

# Run any command when players leave the ffa. Eg. give hotbar items
# DO NOT include `/` in command
# Placeholders: {player} - player name
ffa-leave-commands: []

# Arena cleanup duration in minutes. All blocks placed/broken in arenas
# will be restored after this time. Set to 0 to disable.
cleanup-duration: 30
