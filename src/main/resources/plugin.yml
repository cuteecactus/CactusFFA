name: CactusFFA
version: 1.0.0
main: me.cactusffa.CactusFFAPlugin
api-version: "1.20"
authors: [Codex]
description: Configurable free-for-all plugin with arenas, kits, menus, combat isolation, and scoreboard control.

commands:
  ffa:
    description: Open the FFA menu or join a kit/category.
    usage: /ffa [category] [kit]
  leave:
    description: Leave FFA and restore your state.
    usage: /leave
  cacffa:
    description: Admin command for CactusFFA.
    usage: /cacffa
    permission: cactusffa.admin

permissions:
  cactusffa.admin:
    description: Full admin access to CactusFFA.
    default: op
